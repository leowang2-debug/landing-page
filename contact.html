<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Signup - NoteWave</title>
    <link rel="stylesheet" href="styles.css">
    <script src="components.js" defer></script>
</head>
<body>
    <nav-bar></nav-bar>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary-blue);">Join the Waitlist</h2>
            <p style="text-align: center; margin-bottom: 2rem; color: #495057;">Sign up today to get early access to NoteWave and <strong>1 month of Premium for free!</strong></p>
            
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Thank you for joining the waitlist!');">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Max Mustermann">
                </div>
                <div class="form-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" name="email" required placeholder="maxmustermann@mail.dcu.ie">
                </div>
                <div class="form-group">
                    <label for="university">University</label>
                    <input type="text" id="university" name="university" required placeholder="e.g. Dublin City University">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Submit</button>
            </form>
        </div>
    </main>

    <site-footer></site-footer>
</body>
</html>
