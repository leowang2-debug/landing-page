<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Signup - NoteWave</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">NoteWave</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="market.html">Market</a></li>
                <li><a href="business.html">Business</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary-blue);">Join the Waitlist</h2>
            <p style="text-align: center; margin-bottom: 2rem; color: #495057;">Sign up today to get early access to NoteWave and <strong>1 month of Premium for free!</strong></p>
            
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Thank you for joining the waitlist!');">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" name="email" required placeholder="johndoe@university.edu">
                </div>
                <div class="form-group">
                    <label for="university">University Name</label>
                    <input type="text" id="university" name="university" required placeholder="e.g. Stanford University">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NoteWave. All rights reserved.</p>
    </footer>
</body>
</html>
